<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hors connexion - DIGI-TONTINE CI</title>
    <meta name="theme-color" content="#3C50E0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0F172A;color:#E2E8F0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;padding-top:max(1.5rem,env(safe-area-inset-top));padding-bottom:max(1.5rem,env(safe-area-inset-bottom))}
        .container{text-align:center;max-width:400px}
        .logo{margin-bottom:2rem;font-size:.85rem;color:#64748B}
        .logo span{color:#3C50E0;font-weight:700;font-size:1.1rem}
        .icon{width:80px;height:80px;margin:0 auto 1.5rem;background:rgba(60,80,224,.15);border-radius:1.25rem;display:flex;align-items:center;justify-content:center}
        .icon svg{width:40px;height:40px;color:#818CF8}
        h1{font-size:1.5rem;font-weight:700;margin-bottom:.75rem}
        p{color:#94A3B8;font-size:.95rem;line-height:1.6;margin-bottom:1.5rem}
        .btn{display:inline-flex;align-items:center;gap:.5rem;background:#3C50E0;color:#fff;padding:.75rem 1.5rem;border-radius:.75rem;font-weight:600;font-size:.9rem;border:none;cursor:pointer;transition:background .2s;text-decoration:none}
        .btn:hover{background:#1C3FB7}
        .btn:active{transform:scale(.97)}
        .btn svg{width:18px;height:18px}
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><span>DIGI-TONTINE</span> CI</div>
        <div class="icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18.364 5.636a9 9 0 11-12.728 0M12 9v4m0 4h.01"/>
            </svg>
        </div>
        <h1>Vous etes hors connexion</h1>
        <p>Verifiez votre connexion internet et reessayez. L'application necessite une connexion pour fonctionner.</p>
        <button class="btn" onclick="window.location.reload()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            Reessayer
        </button>
    </div>
</body>
</html>
